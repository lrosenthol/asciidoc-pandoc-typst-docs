<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Numbering overview</title>
  <desc id="desc">A diagram showing numbered headings, figures, and examples aligned into three coordinated counters.</desc>
  <rect width="960" height="420" fill="#fbfbfc"/>
  <text x="100" y="90" font-family="'Source Sans 3', sans-serif" font-size="28" fill="#14355b">Heading Counter</text>
  <text x="100" y="145" font-family="'Source Code Pro', monospace" font-size="22" fill="#2f4858">1</text>
  <text x="160" y="145" font-family="'Source Code Pro', monospace" font-size="22" fill="#2f4858">1.1</text>
  <text x="270" y="145" font-family="'Source Code Pro', monospace" font-size="22" fill="#2f4858">1.1.1</text>
  <line x1="100" y1="165" x2="360" y2="165" stroke="#c8d1dc" stroke-width="4"/>
  <text x="100" y="245" font-family="'Source Sans 3', sans-serif" font-size="28" fill="#14355b">Figure Counter</text>
  <circle cx="140" cy="305" r="28" fill="#e5eef8"/>
  <circle cx="240" cy="305" r="28" fill="#e5eef8"/>
  <text x="140" y="314" font-family="'Source Code Pro', monospace" font-size="22" text-anchor="middle" fill="#14355b">1</text>
  <text x="240" y="314" font-family="'Source Code Pro', monospace" font-size="22" text-anchor="middle" fill="#14355b">2</text>
  <text x="470" y="90" font-family="'Source Sans 3', sans-serif" font-size="28" fill="#14355b">Example Counter</text>
  <rect x="470" y="120" width="320" height="80" rx="8" fill="#ffffff" stroke="#d4d9df" stroke-width="2"/>
  <rect x="470" y="240" width="320" height="80" rx="8" fill="#ffffff" stroke="#d4d9df" stroke-width="2"/>
  <text x="495" y="155" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#6b7280">Example 1</text>
  <text x="495" y="275" font-family="'Source Sans 3', sans-serif" font-size="18" fill="#6b7280">Example 2</text>
  <text x="495" y="184" font-family="'Source Sans 3', sans-serif" font-size="24" fill="#14355b">JSON payload sample</text>
  <text x="495" y="304" font-family="'Source Sans 3', sans-serif" font-size="24" fill="#14355b">Cross-reference snippet</text>
</svg>
